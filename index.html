<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커뮤니티 디자인 목업</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --pink: #F9C9D2;
    --pink-deep: #E8B7BB;
    --brown: #EFE6D8;
    --brown-deep: #CBAE8F;
    --gray: #E4E4E2;
    --gray-deep: #B9B7B4;
    --ink: #4B4B49;
    --muted: #A8A6A2;
    --white: #FFFDFA;
    --radius: 18px;
    --gap: 14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Pretendard', -apple-system, sans-serif;
    background: var(--white);
    color: var(--ink);
    min-height:100vh;
  }
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit;}
  input{font-family:inherit;}
  svg{ width:18px; height:18px; stroke-width:1.8; }

  /* ---------- 공통 컴포넌트 ---------- */
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--white);
    border: 1px solid #EAE7E3;
    border-radius: 999px;
    padding: 10px 16px;
    box-shadow: 0 2px 10px rgba(74,59,53,0.06);
  }
  .search-box svg{ color: var(--muted); flex-shrink:0; }
  .search-box input{
    border:none; outline:none; background:transparent;
    font-size:14px; color:var(--ink); width:100%;
  }
  .search-box input::placeholder{ color: var(--muted); }

  .icon-btn{
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    color: var(--ink);
    transition: background .15s ease;
  }
  .icon-btn:hover{ background: rgba(255,255,255,0.6); }
  .icon-btn svg{ width:17px; height:17px; }

  .avatar{
    width:64px; height:64px; border-radius:50%;
    background: var(--gray);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .avatar svg{ color: var(--gray-deep); width:26px; height:26px; }

  .profile-name{
    font-size:16px; font-weight:600;
  }
  .profile-name .uid{
    font-weight:400; font-size:13px; color: var(--muted); margin-left:4px;
  }
  .intro{
    font-size:13px; color: var(--muted); margin-top:4px; line-height:1.5;
  }

  .quick-buttons{
    display:grid; grid-template-columns:repeat(4,1fr); gap:var(--gap);
  }
  .quick-buttons button{
    background: var(--gray-deep);
    border-radius: 14px;
    padding: 14px 6px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    box-shadow: 0 2px 10px rgba(74,59,53,0.06);
    font-size:12px; font-weight:500; color: var(--white);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .quick-buttons button:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(74,59,53,0.1);
  }
  .quick-buttons button svg{ color: var(--white); }

  /* ---------- 데스크톱 (2.5 : 7.5) ---------- */
  .desktop-view{
    display:grid;
    grid-template-columns: 2.5fr 7.5fr;
    min-height:100vh;
  }
  .desktop-view .sidebar{
    /* 선(border) 없이 은은한 그림자로만 영역을 구분 */
    box-shadow: 4px 0 24px rgba(74,59,53,0.05);
    padding: 32px 24px;
    display:flex; flex-direction:column; gap:28px;
  }
  .desktop-view .profile{
    display:flex; flex-direction:column; align-items:flex-start; gap:10px;
  }
  .desktop-view .main{
    padding: 24px 32px;
    display:flex; flex-direction:column; gap:20px;
  }
  .desktop-view .topbar{
    display:flex; justify-content:flex-end; align-items:center; gap:4px;
  }

  /* ---------- 메인 영역: 화면 전환 ---------- */
  .main-view{ display:none; flex-direction:column; gap:20px; flex:1; min-height:0; }
  .main-view.active{ display:flex; }

  .view-header{
    display:flex; align-items:center; justify-content:space-between;
  }
  .view-header h2{
    font-size:20px; font-weight:700; letter-spacing:0.3px;
  }

  .calendar-layout{
    display:grid; grid-template-columns: 1fr 260px; gap:16px; flex:1; min-height:0;
  }
  .calendar-box, .todo-box{
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 2px 10px rgba(74,59,53,0.05);
    padding: 20px;
    display:flex; align-items:center; justify-content:center;
    color: var(--muted); font-size:14px; font-weight:500;
    min-height: 360px;
  }
  .habit-bar{
    background: var(--gray);
    border-radius: 14px;
    padding: 14px 20px;
    text-align:center;
    color: var(--ink); font-size:14px; font-weight:500;
  }

  /* 데스크톱 전용: 퀵버튼 세로 나열 (아이콘 + 라벨 가로 정렬) */
  .desktop-view .quick-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .desktop-view .quick-buttons button{
    flex-direction:row;
    justify-content:flex-start;
    align-items:center;
    gap:12px;
    padding: 12px 14px;
    font-size:13px;
  }

  /* ---------- 모바일 ---------- */
  .mobile-view{ display:none; padding: 20px 16px; }
  .mobile-view .topbar{
    display:flex; align-items:center; gap:8px; margin-bottom:22px;
  }
  .mobile-view .topbar .search-box{ flex:1; }
  .mobile-view .topbar .icon-group{ display:flex; align-items:center; }
  .mobile-view .profile{
    display:flex; align-items:center; gap:14px; margin-bottom:22px;
  }
  .mobile-view .profile .avatar{ width:56px; height:56px; }
  .mobile-view .profile .avatar svg{ width:22px; height:22px; }
  .mobile-view .quick-buttons{ margin-bottom:20px; }

  /* 모바일: 화면 전환 */
  .main-view-m{ display:none; flex-direction:column; gap:14px; }
  .main-view-m.active{ display:flex; }

  .mobile-view .view-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:2px;
  }
  .mobile-view .view-header h2{
    font-size:18px; font-weight:700; letter-spacing:0.3px;
  }
  .mobile-calendar-box{
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 2px 10px rgba(74,59,53,0.05);
    padding: 20px;
    min-height: 220px;
    display:flex; align-items:center; justify-content:center;
    color: var(--muted); font-size:14px; font-weight:500;
  }

  /* 접었다 펼 수 있는 섹션 (투두 / 해빗트래커) */
  .collapsible{
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 2px 10px rgba(74,59,53,0.05);
    overflow:hidden;
  }
  .collapsible-header{
    width:100%;
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 16px;
    font-size:14px; font-weight:600; color: var(--ink);
  }
  .collapsible-header svg{ color: var(--muted); transition: transform .2s ease; }
  .collapsible-header.open svg{ transform: rotate(180deg); }
  .collapsible-content{ display:none; padding: 0 16px 16px; color: var(--muted); font-size:13px; }
  .collapsible-content.open{ display:block; }

  @media (max-width: 768px){
    .desktop-view{ display:none; }
    .mobile-view{ display:block; }
  }
</style>
</head>
<body>

  <!-- ================= 데스크톱 (아이패드 가로) ================= -->
  <div class="desktop-view">
    <aside class="sidebar">
      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" placeholder="검색">
      </div>

      <div class="profile">
        <div class="avatar"><i data-lucide="image"></i></div>
        <div class="profile-name">이름<span class="uid">@아이디</span></div>
        <p class="intro">한 줄 소개가 여기에 들어갑니다.</p>
      </div>

      <div class="quick-buttons">
        <button onclick="showMainView('view-calendar')">일정</button>
        <button onclick="showMainView('view-default')">시간</button>
        <button onclick="showMainView('view-default')">메모</button>
        <button onclick="showMainView('view-default')">?</button>
      </div>
    </aside>

    <main class="main">
      <div id="view-default" class="main-view active">
        <div class="topbar">
          <button class="icon-btn"><i data-lucide="plus"></i></button>
          <button class="icon-btn"><i data-lucide="mail"></i></button>
          <button class="icon-btn"><i data-lucide="bell"></i></button>
          <button class="icon-btn"><i data-lucide="settings"></i></button>
        </div>
      </div>

      <div id="view-calendar" class="main-view">
        <div class="view-header">
          <h2>CALENDAR</h2>
          <div class="topbar" style="justify-content:flex-end;">
            <button class="icon-btn"><i data-lucide="plus"></i></button>
            <button class="icon-btn"><i data-lucide="more-horizontal"></i></button>
          </div>
        </div>
        <div class="calendar-layout">
          <div class="calendar-box">달력</div>
          <div class="todo-box">투두</div>
        </div>
        <div class="habit-bar">해빗트래커</div>
      </div>
    </main>
  </div>

  <!-- ================= 모바일 (아이패드 세로) ================= -->
  <div class="mobile-view">
    <div class="topbar">
      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" placeholder="검색">
      </div>
      <div class="icon-group">
        <button class="icon-btn"><i data-lucide="plus"></i></button>
        <button class="icon-btn"><i data-lucide="mail"></i></button>
        <button class="icon-btn"><i data-lucide="bell"></i></button>
        <button class="icon-btn"><i data-lucide="settings"></i></button>
      </div>
    </div>

    <div class="profile">
      <div class="avatar"><i data-lucide="image"></i></div>
      <div>
        <div class="profile-name">이름<span class="uid">@아이디</span></div>
        <p class="intro">한 줄 소개가 여기에 들어갑니다.</p>
      </div>
    </div>

    <div class="quick-buttons">
      <button onclick="showMobileView('mobile-view-calendar')">일정</button>
      <button onclick="showMobileView('mobile-view-default')">시간</button>
      <button onclick="showMobileView('mobile-view-default')">메모</button>
      <button onclick="showMobileView('mobile-view-default')">?</button>
    </div>

    <div id="mobile-view-default" class="main-view-m active"></div>

    <div id="mobile-view-calendar" class="main-view-m">
      <div class="view-header">
        <h2>CALENDAR</h2>
        <div class="icon-group">
          <button class="icon-btn"><i data-lucide="plus"></i></button>
          <button class="icon-btn"><i data-lucide="more-horizontal"></i></button>
        </div>
      </div>

      <div class="mobile-calendar-box">달력</div>

      <div class="collapsible">
        <button class="collapsible-header open" onclick="toggleCollapse(this)">
          투두 <i data-lucide="chevron-down"></i>
        </button>
        <div class="collapsible-content open">투두 리스트가 여기에 들어갑니다.</div>
      </div>

      <div class="collapsible">
        <button class="collapsible-header open" onclick="toggleCollapse(this)">
          해빗트래커 <i data-lucide="chevron-down"></i>
        </button>
        <div class="collapsible-content open">해빗트래커 내용이 여기에 들어갑니다.</div>
      </div>
    </div>

  </div>

<script>
  lucide.createIcons();
  function showMainView(id){
    document.querySelectorAll('.main-view').forEach(function(el){ el.classList.remove('active'); });
    var target = document.getElementById(id);
    if(target){ target.classList.add('active'); }
  }
  function showMobileView(id){
    document.querySelectorAll('.main-view-m').forEach(function(el){ el.classList.remove('active'); });
    var target = document.getElementById(id);
    if(target){ target.classList.add('active'); }
  }
  function toggleCollapse(btn){
    var content = btn.nextElementSibling;
    var isOpen = content.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  }
</script>
</body>
</html>
