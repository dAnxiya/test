<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOME</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    color: #1c1c1e; background: #fff;
  }
  button, input { font-family: inherit; }
  #app { display: flex; height: 100vh; width: 100%; }

  /* ---------- sidebar ---------- */
  .sidebar {
    width: 216px; flex-shrink: 0; background: #fafafa; border-right: 1px solid #e8e8ea;
    display: flex; flex-direction: column; padding: 22px 16px;
  }
  .avatar-block { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 26px; }
  .avatar-circle {
    width: 92px; height: 92px; border-radius: 50%; background: #e2e2e6;
    display: flex; align-items: center; justify-content: center; color: #a6a6ab;
  }
  .avatar-circle svg { width: 38px; height: 38px; }
  .avatar-name { font-size: 12.5px; font-weight: 600; color: #6e6e73; }

  .nav-list { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 9px;
    border: none; background: transparent; cursor: pointer; width: 100%; text-align: left;
    font-size: 13.5px; font-weight: 500; color: #48484c;
  }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; color: #9a9a9e; }
  .nav-item:hover { background: #f0f0f2; }
  .nav-item.active { background: #1c1c1e; color: #fff; }
  .nav-item.active svg { color: #fff; }

  .nav-spacer { flex: 1; }

  .date-card {
    background: #1c1c1e; color: #fff; border-radius: 14px; padding: 14px 16px; margin-top: 14px;
  }
  .date-year { font-size: 10.5px; color: #9a9a9e; font-weight: 600; margin-bottom: 2px; }
  .date-full { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .date-time { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; font-family: ui-monospace, "SF Mono", monospace; }

  /* ---------- main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; padding: 22px 30px; min-width: 0; background: #fff; }

  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .search-box {
    flex: 1; display: flex; align-items: center; gap: 8px; background: #f4f4f5; border: 1px solid #ececef;
    border-radius: 12px; padding: 9px 14px; max-width: 480px;
  }
  .search-box svg { width: 16px; height: 16px; color: #a6a6ab; flex-shrink: 0; }
  .search-box input { border: none; background: transparent; outline: none; font-size: 13.5px; width: 100%; color: #1c1c1e; }
  .search-box input::placeholder { color: #b0b0b5; }
  .topbar-spacer { flex: 1; }
  .icon-btn-group { display: flex; align-items: center; gap: 4px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 9px; border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #6e6e73;
  }
  .icon-btn:hover { background: #f0f0f2; }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn.accent { color: #fff; background: #FF3B30; }
  .icon-btn.accent:hover { background: #e6362b; }

  .grid { flex: 1; display: flex; gap: 18px; min-height: 0; }
  .col-left { flex: 2.1; display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .col-right { flex: 1; min-width: 220px; }

  .photo-banner {
    flex: none; height: 46vh; max-height: 380px; background: #eceded; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #b0b0b5; font-size: 13px; font-weight: 600; gap: 8px; min-height: 160px;
  }
  .photo-banner svg { width: 22px; height: 22px; }

  .bottom-row { display: flex; gap: 18px; height: 150px; margin-top: auto; }

  .dday-card {
    flex: 1; background: #f4f4f5; border: 1px solid #ececef; border-radius: 16px; padding: 16px 18px;
    display: flex; flex-direction: column; justify-content: center; gap: 6px;
  }
  .dday-label { font-size: 12px; font-weight: 600; color: #8e8e93; }
  .dday-value { font-size: 30px; font-weight: 800; color: #FF3B30; letter-spacing: 0.3px; }

  .notes-card {
    flex: 1.3; background: #f4f4f5; border: 1px solid #ececef; border-radius: 16px; padding: 14px 16px;
    display: flex; flex-direction: column; min-width: 0;
  }
  .notes-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .notes-head span { font-size: 12.5px; font-weight: 700; color: #1c1c1e; letter-spacing: 0.3px; }
  .notes-add { width: 24px; height: 24px; border-radius: 50%; border: none; background: #1c1c1e; color: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .notes-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .note-row {
    display: flex; align-items: center; gap: 9px; background: #fff; border-radius: 9px; padding: 8px 10px;
  }
  .note-row svg { width: 14px; height: 14px; color: #c7c7cc; flex-shrink: 0; }
  .note-text { font-size: 12px; color: #48484c; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .pending-panel {
    height: 100%; background: #fff; border: 1px solid #ececef; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    color: #c7c7cc; text-align: center; padding: 20px;
  }
  .pending-panel svg { width: 30px; height: 30px; }
  .pending-panel span { font-size: 13px; font-weight: 600; color: #a6a6ab; }
</style>
</head>
<body>
<div id="app">

  <!-- sidebar -->
  <div class="sidebar">
    <div class="avatar-block">
      <div class="avatar-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
      </div>
      <div class="avatar-name">사진</div>
    </div>

    <div class="nav-list">
      <button class="nav-item active" data-id="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"/></svg>
        HOME
      </button>
      <button class="nav-item" data-id="tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12l2.3 2.3L16 9"/></svg>
        TASKS
      </button>
      <button class="nav-item" data-id="notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3.5h9L19 8v12.5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1z"/><path d="M14 3.5V8h5"/><path d="M8 13h8M8 16.5h5"/></svg>
        NOTES
      </button>
      <button class="nav-item" data-id="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="5" width="17" height="15" rx="2.2"/><path d="M3.5 9.5h17"/><path d="M8 3v3.4M16 3v3.4"/></svg>
        CALENDAR
      </button>
      <button class="nav-item" data-id="time">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3.2 2"/></svg>
        TIME
      </button>
      <button class="nav-item" data-id="help">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.5"/><path d="M9.5 9.3a2.5 2.5 0 0 1 4.9.7c0 1.7-2.4 2-2.4 3.6"/><circle cx="12" cy="16.6" r="0.3" fill="currentColor"/></svg>
        HELP
      </button>
    </div>

    <div class="nav-spacer"></div>

    <div class="date-card">
      <div class="date-year" id="dateYear"></div>
      <div class="date-full" id="dateFull"></div>
      <div class="date-time" id="dateTime"></div>
    </div>
  </div>

  <!-- main -->
  <div class="main">
    <div class="topbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" placeholder="검색" />
      </div>
      <div class="topbar-spacer"></div>
      <div class="icon-btn-group">
        <button class="icon-btn accent" title="추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="icon-btn" title="메일">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="5.5" width="17" height="13" rx="2"/><path d="M4 6.5l8 6.2 8-6.2"/></svg>
        </button>
        <button class="icon-btn" title="알림">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 10a6 6 0 1 1 12 0c0 4 1.4 5.4 1.4 5.4H4.6S6 14 6 10z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>
        </button>
        <button class="icon-btn" title="설정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H4.5a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H10.6a1.7 1.7 0 0 0 1-1.6V4.5a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V10.6a1.7 1.7 0 0 0 1.6 1H19.5a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>
        </button>
      </div>
    </div>

    <div class="grid">
      <div class="col-left">
        <div class="photo-banner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.6"/><path d="M21 16l-5.5-5.5L6 19"/></svg>
          사진
        </div>
        <div class="bottom-row">
          <div class="dday-card">
            <div class="dday-label" id="ddayLabel">디데이 이름</div>
            <div class="dday-value" id="ddayValue">D-0</div>
          </div>
          <div class="notes-card">
            <div class="notes-head">
              <span>QUICK NOTES</span>
              <button class="notes-add" id="quickAddBtn">+</button>
            </div>
            <div class="notes-list" id="quickNotesList"></div>
          </div>
        </div>
      </div>

      <div class="col-right">
        <div class="pending-panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9.5 9.3a2.5 2.5 0 0 1 4.9.7c0 1.7-2.4 2-2.4 3.6"/><circle cx="12" cy="16.6" r="0.3" fill="currentColor"/><circle cx="12" cy="12" r="9"/></svg>
          <span>고민중...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  /* nav switching (visual only) */
  document.querySelectorAll(".nav-item").forEach((btn) => {
    btn.onclick = () => {
      document.querySelectorAll(".nav-item").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
    };
  });

  /* date / time widget */
  function updateClock() {
    const now = new Date();
    const weekdays = ["일","월","화","수","목","금","토"];
    document.getElementById("dateYear").textContent = `${now.getFullYear()}`;
    document.getElementById("dateFull").textContent =
      `${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")} (${weekdays[now.getDay()]})`;
    document.getElementById("dateTime").textContent =
      `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  }
  updateClock();
  setInterval(updateClock, 1000 * 10);

  /* D-day (example target date — adjust as needed) */
  function updateDday() {
    const target = new Date("2026-08-15T00:00:00");
    const now = new Date();
    const diffDays = Math.ceil((target.setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
    const label = diffDays === 0 ? "D-day" : diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)}`;
    document.getElementById("ddayValue").textContent = label;
  }
  updateDday();

  /* quick notes */
  let quickNotes = [
    { id: "q1", text: "TRPG 세션 시나리오 다듬기" },
    { id: "q2", text: "캘린더 색상 최종 확정" },
  ];
  function renderQuickNotes() {
    const el = document.getElementById("quickNotesList");
    el.innerHTML = "";
    quickNotes.forEach((n) => {
      const row = document.createElement("div");
      row.className = "note-row";
      row.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19l1-4.2L15.8 4 20 8.2 8.2 19H4z"/></svg>
        <span class="note-text">${n.text}</span>`;
      el.appendChild(row);
    });
  }
  document.getElementById("quickAddBtn").onclick = () => {
    const text = prompt("메모 내용을 입력하세요");
    if (text && text.trim()) {
      quickNotes.push({ id: "q" + Date.now(), text: text.trim() });
      renderQuickNotes();
    }
  };
  renderQuickNotes();
</script>
</body>
</html>
