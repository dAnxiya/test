<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOME</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    color: #1c1c1e; background: #fff;
  }
  button, input, select, textarea { font-family: inherit; }
  #app { display: flex; height: 100vh; width: 100%; }

  /* ================= sidebar ================= */
  .sidebar {
    width: 216px; flex-shrink: 0; background: #fafafa; border-right: 1px solid #e8e8ea;
    display: flex; flex-direction: column; padding: 22px 16px;
  }
  .avatar-block { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 26px; }
  .avatar-circle {
    width: 92px; height: 92px; border-radius: 50%; background: #e2e2e6;
    display: flex; align-items: center; justify-content: center; color: #a6a6ab;
  }
  .avatar-circle svg { width: 38px; height: 38px; }
  .avatar-name { font-size: 12.5px; font-weight: 600; color: #6e6e73; }

  .nav-list { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 9px;
    border: none; background: transparent; cursor: pointer; width: 100%; text-align: left;
    font-size: 13.5px; font-weight: 500; color: #48484c;
  }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; color: #9a9a9e; }
  .nav-item:hover { background: #f0f0f2; }
  .nav-item.active { background: #1c1c1e; color: #fff; }
  .nav-item.active svg { color: #fff; }

  .nav-spacer { height: 24px; }

  .date-card {
    background: #1c1c1e; color: #fff; border-radius: 14px; padding: 14px 16px; margin-top: 14px;
  }
  .date-year { font-size: 10.5px; color: #9a9a9e; font-weight: 600; margin-bottom: 2px; }
  .date-full { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .date-time { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; font-family: ui-monospace, "SF Mono", monospace; }

  /* ================= main shell ================= */
  .main { flex: 1; display: flex; flex-direction: column; padding: 22px 30px; min-width: 0; min-height: 0; background: #fff; }

  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-shrink: 0; }
  .search-box {
    flex: 1; display: flex; align-items: center; gap: 8px; background: #f4f4f5; border: 1px solid #ececef;
    border-radius: 12px; padding: 9px 14px; max-width: 480px;
  }
  .search-box svg { width: 16px; height: 16px; color: #a6a6ab; flex-shrink: 0; }
  .search-box input { border: none; background: transparent; outline: none; font-size: 13.5px; width: 100%; color: #1c1c1e; }
  .search-box input::placeholder { color: #b0b0b5; }
  .topbar-spacer { flex: 1; }
  .icon-btn-group { display: flex; align-items: center; gap: 4px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 9px; border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #6e6e73;
  }
  .icon-btn:hover { background: #f0f0f2; }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn.accent { color: #fff; background: #FF3B30; }
  .icon-btn.accent:hover { background: #e6362b; }

  .view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .page-title {
    font-size: 22px; font-weight: 800; letter-spacing: 0.5px;
    border-bottom: 2px dashed #FF3B30; padding-bottom: 5px; display: inline-block; margin-bottom: 18px; flex-shrink: 0;
  }
  .content { flex: 1; display: flex; gap: 18px; min-height: 0; }
  .card { background: #fff; border-radius: 14px; }

  /* ================= home view ================= */
  .grid { flex: 1; display: flex; gap: 18px; min-height: 0; }
  .col-left { flex: 2.1; display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .col-right { flex: 1; min-width: 220px; }

  .photo-banner {
    flex: none; height: 42vh; max-height: 360px; background: #eceded; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #b0b0b5; font-size: 13px; font-weight: 600; gap: 8px; min-height: 160px;
  }
  .photo-banner svg { width: 22px; height: 22px; }

  .bottom-row { display: flex; gap: 18px; height: 150px; }

  .dday-card {
    flex: 1; background: #f4f4f5; border: 1px solid #ececef; border-radius: 16px; padding: 16px 18px;
    display: flex; flex-direction: column; justify-content: center; gap: 6px;
  }
  .dday-label { font-size: 12px; font-weight: 600; color: #8e8e93; }
  .dday-value { font-size: 30px; font-weight: 800; color: #FF3B30; letter-spacing: 0.3px; }

  .notes-card {
    flex: 1.3; background: #f4f4f5; border: 1px solid #ececef; border-radius: 16px; padding: 14px 16px;
    display: flex; flex-direction: column; min-width: 0;
  }
  .notes-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .notes-head span { font-size: 12.5px; font-weight: 700; color: #1c1c1e; letter-spacing: 0.3px; }
  .notes-add { width: 24px; height: 24px; border-radius: 50%; border: none; background: #1c1c1e; color: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .notes-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .note-row { display: flex; align-items: center; gap: 9px; background: #fff; border-radius: 9px; padding: 8px 10px; }
  .note-row svg { width: 14px; height: 14px; color: #c7c7cc; flex-shrink: 0; }
  .note-text { font-size: 12px; color: #48484c; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .pending-panel {
    height: 100%; background: #fff; border: 1px solid #ececef; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    color: #c7c7cc; text-align: center; padding: 20px;
  }
  .pending-panel svg { width: 30px; height: 30px; }
  .pending-panel span { font-size: 13px; font-weight: 600; color: #a6a6ab; }

  /* ================= calendar view ================= */
  .cal-panel { flex: 2.4; background: #f4f4f5; border: 1px solid #e5e5ea; border-radius: 14px; overflow: hidden; min-width: 0; display: flex; }
  .cal-app { background: #fff; height: 100%; display: flex; flex: 1; min-width: 0; }
  .todo-panel { flex: 1; background: #f4f4f5; border: 1px solid #e5e5ea; border-radius: 14px; overflow: hidden; min-width: 220px; display: flex; flex-direction: column; }

  .cal-sidebar { width: 168px; flex-shrink: 0; border-right: 1px solid #ececef; overflow-y: auto; }
  .mini-cal { padding: 0 12px 14px; }
  .mini-cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .mini-cal-head button { border: none; background: transparent; color: #8e8e93; font-size: 14px; cursor: pointer; width: 18px; height: 18px; }
  .mini-cal-head span { font-size: 12px; font-weight: 600; }
  .mini-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); row-gap: 1px; }
  .mini-cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); font-size: 9.5px; color: #a1a1a6; margin-bottom: 3px; }
  .mini-cal-weekdays span { text-align: center; }
  .mini-cal-grid button { border: none; background: transparent; font-size: 10.5px; width: 19px; height: 19px; border-radius: 50%; margin: 0 auto; cursor: pointer; display: block; color: #1c1c1e; }
  .mini-cal-grid button.today { color: #FF3B30; font-weight: 700; }
  .mini-cal-grid button.selected { background: #FF3B30; color: #fff; font-weight: 700; }
  .mini-cal-grid button.outmonth { color: #d4d4d8; }

  .category-panel { padding: 14px 12px; display: flex; flex-direction: column; gap: 2px; height: 100%; }
  .category-title { font-size: 12px; font-weight: 800; letter-spacing: 0.5px; color: #1c1c1e; margin-bottom: 10px; }
  .category-row { display: flex; align-items: center; gap: 8px; padding: 7px 4px; border-radius: 8px; cursor: pointer; }
  .category-row:hover { background: #f4f4f5; }
  .category-row input[type=checkbox] { width: 12px; height: 12px; flex-shrink: 0; }
  .cal-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .category-name { flex: 1; font-size: 12.5px; color: #1c1c1e; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .category-name.inactive { color: #d4d4d8; }
  .category-count { font-size: 11px; color: #a6a6ab; font-weight: 600; min-width: 14px; text-align: right; }
  .category-count.inactive { color: #d4d4d8; }
  .category-add { margin-top: 8px; border: 1px dashed #d4d4d8; background: transparent; border-radius: 9px; padding: 8px 4px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; color: #8e8e93; font-size: 12px; font-weight: 600; }
  .category-add:hover { background: #f4f4f5; border-color: #c7c7cc; }
  .category-add-icon { font-size: 13px; font-weight: 700; }

  .cal-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .cal-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #ececef; }
  .cal-toolbar .today-btn { border: 1px solid #e2e2e6; background: #fff; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
  .cal-toolbar .nav-btn { border: 1px solid #e2e2e6; background: #fff; font-size: 13px; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; }
  .cal-toolbar .month-label { font-size: 14.5px; font-weight: 700; }
  .cal-toolbar .spacer { flex: 1; }
  .add-btn { border: none; background: #007AFF; color: #fff; font-size: 12px; font-weight: 600; border-radius: 7px; padding: 6px 12px; cursor: pointer; }

  .month-grid-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .weekday-row { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid #e2e2e6; }
  .weekday-row div { text-align: center; font-size: 10px; font-weight: 600; color: #8e8e93; padding: 5px 0; }
  .weekday-row div.sun { color: #FF3B30; }
  .weekday-row div.sat { color: #007AFF; }
  .day-grid { flex: 1; display: grid; grid-template-columns: repeat(7,1fr); grid-template-rows: repeat(6,1fr); }
  .day-cell { border-right: 1px solid #ececef; border-bottom: 1px solid #ececef; background: #fff; padding: 3px 4px; display: flex; flex-direction: column; gap: 1px; cursor: pointer; overflow: hidden; }
  .day-cell.selected { background: #eef5ff; }
  .day-num { align-self: flex-start; font-size: 11px; font-weight: 500; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1c1c1e; }
  .day-num.today { background: #FF3B30; color: #fff; font-weight: 700; }
  .day-num.outmonth { color: #d4d4d8; }
  .day-num.sun { color: #FF3B30; }
  .day-num.sat { color: #007AFF; }
  .day-events { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
  .event-pill { display: flex; align-items: center; gap: 4px; width: 100%; text-align: left; border: none; border-radius: 4px; padding: 1px 4px; cursor: pointer; overflow: hidden; background: transparent; font: inherit; }
  .event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .event-title { font-size: 10.5px; font-weight: 500; color: #1c1c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-pill.allday .event-title { color: #fff; font-weight: 600; }
  .event-time { color: #9a9a9e; font-weight: 400; margin-right: 3px; }
  .more-note { font-size: 9.5px; color: #a1a1a6; padding-left: 4px; }

  .todo-header { padding: 16px 18px 10px; font-size: 14px; font-weight: 700; }
  .todo-list { flex: 1; overflow-y: auto; padding: 0 14px; display: flex; flex-direction: column; gap: 4px; }
  .todo-row { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 8px; background: #fff; }
  .todo-check { width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0; cursor: pointer; border: 1.5px solid #c7c7cc; background: transparent; }
  .todo-check.done { border: none; background: #34C759; }
  .todo-text { flex: 1; font-size: 13px; color: #1c1c1e; }
  .todo-text.done { color: #b0b0b5; text-decoration: line-through; }
  .todo-del { border: none; background: none; color: #c7c7cc; font-size: 15px; cursor: pointer; padding: 0 2px; }
  .todo-empty { font-size: 12.5px; color: #c7c7cc; padding: 10px 4px; }
  .todo-input-row { padding: 14px; border-top: 1px solid #ececef; display: flex; gap: 6px; }
  .todo-input-row input { flex: 1; border: 1px solid #e5e5ea; border-radius: 8px; padding: 7px 10px; font-size: 12.5px; outline: none; }
  .todo-add-btn { border: none; background: #1c1c1e; color: #fff; border-radius: 8px; width: 32px; font-size: 15px; cursor: pointer; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.28); display: none; align-items: center; justify-content: center; z-index: 50; }
  .modal-overlay.show { display: flex; }
  .modal-box { width: 360px; max-width: 92vw; background: #fff; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; }
  .modal-head { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .modal-head button { border: none; background: none; font-size: 14px; cursor: pointer; }
  .cancel-btn { color: #007AFF; }
  .save-btn { color: #007AFF; font-weight: 600; }
  .save-btn:disabled { color: #c7c7cc; cursor: default; }
  .modal-title { font-size: 13px; font-weight: 600; }
  .modal-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .field-input { border: 1px solid #e5e5ea; border-radius: 8px; padding: 9px 10px; font-size: 14px; outline: none; width: 100%; }
  .field-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; }
  .field-row.between { justify-content: space-between; }
  .field-label { color: #6e6e73; width: 56px; flex-shrink: 0; }
  .field-select { border: 1px solid #e5e5ea; border-radius: 8px; padding: 7px 8px; font-size: 14px; outline: none; flex: 1; }
  .delete-btn { margin-top: 4px; border: none; background: #fff1f0; color: #FF3B30; font-size: 13.5px; font-weight: 600; border-radius: 8px; padding: 9px 0; cursor: pointer; width: 100%; }

  /* ================= time view ================= */
  .panel-left { flex: 1.3; background: #f4f4f5; border: 1px solid #e5e5ea; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  .panel-right { flex: 1; display: flex; flex-direction: column; gap: 16px; min-width: 240px; }

  .timer-card { padding: 26px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .subject-select { border: 1px solid #e5e5ea; border-radius: 20px; padding: 5px 14px; font-size: 12.5px; font-weight: 600; outline: none; cursor: pointer; }
  .clock { font-size: 52px; font-weight: 800; letter-spacing: 1px; color: #1c1c1e; font-family: ui-monospace, "SF Mono", monospace; }
  .timer-btns { display: flex; gap: 10px; }
  .btn-start { border: none; background: #1c1c1e; color: #fff; font-size: 13.5px; font-weight: 700; border-radius: 24px; padding: 10px 28px; cursor: pointer; }
  .btn-start.running { background: #FF9500; }
  .btn-stop { border: 1px solid #e5e5ea; background: #fff; color: #FF3B30; font-size: 13.5px; font-weight: 700; border-radius: 24px; padding: 10px 22px; cursor: pointer; }
  .btn-stop:disabled { color: #d4d4d8; cursor: default; }
  .focus-note { font-size: 11.5px; color: #8e8e93; display: none; align-items: center; gap: 5px; }
  .focus-note.show { display: flex; }
  .focus-dot { width: 6px; height: 6px; border-radius: 50%; background: #FF3B30; }

  .log-card { padding: 16px 20px; flex: 1; overflow-y: auto; min-height: 0; }
  .card-title { font-size: 13px; font-weight: 700; color: #1c1c1e; margin-bottom: 10px; }
  .empty-note { font-size: 12px; color: #c7c7cc; }
  .log-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; padding: 4px 0; }
  .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .log-name { flex: 1; color: #1c1c1e; font-weight: 500; }
  .log-time { color: #8e8e93; }
  .log-ended { color: #c7c7cc; width: 56px; text-align: right; }

  .stats-card { padding: 18px 20px; }
  .stats-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .stats-header .label { font-size: 13px; font-weight: 700; }
  .stats-header .value { font-size: 15px; font-weight: 800; }
  .stat-row { margin-bottom: 10px; }
  .stat-row:last-child { margin-bottom: 0; }
  .stat-labels { display: flex; justify-content: space-between; font-size: 11.5px; margin-bottom: 3px; }
  .stat-labels .name { font-weight: 600; }
  .stat-labels .val { color: #8e8e93; }
  .bar-track { height: 6px; border-radius: 4px; background: #f0f0f3; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .2s; }

  .apps-card { padding: 16px 20px; }
  .apps-sub { font-size: 10.5px; color: #c7c7cc; margin-bottom: 10px; }
  .app-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 2px; }
  .app-name { font-size: 12.5px; color: #1c1c1e; }
  .toggle { width: 34px; height: 20px; border-radius: 12px; background: #e5e5ea; position: relative; cursor: pointer; transition: background .15s; flex-shrink: 0; }
  .toggle.on { background: #34C759; }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.25); transition: left .15s; }
  .toggle.on .knob { left: 16px; }

  /* ================= notes view ================= */
  .notes-content { flex-direction: column; gap: 16px; }
  .quicknotes-section { flex-shrink: 0; }
  .section-title { font-size: 13px; font-weight: 800; letter-spacing: 0.5px; color: #1c1c1e; margin-bottom: 10px; }
  .quicknotes-row { display: flex; align-items: center; gap: 8px; }
  .qn-nav { border: 1px solid #e5e5ea; background: #fff; border-radius: 50%; width: 28px; height: 28px; flex-shrink: 0; cursor: pointer; color: #8e8e93; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .qn-nav:hover { background: #f4f4f5; }
  .qn-scroll { flex: 1; display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 2px 2px 8px; }
  .qn-scroll::-webkit-scrollbar { height: 5px; }
  .qn-scroll::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 3px; }
  .qn-card { flex: 0 0 220px; background: #f4f4f5; border: 1px solid #ececef; border-radius: 14px; padding: 14px 16px; display: flex; gap: 10px; cursor: pointer; }
  .qn-card:hover { background: #eeeeef; }
  .qn-icon { width: 15px; height: 15px; color: #c7c7cc; flex-shrink: 0; margin-top: 2px; }
  .qn-icon svg { width: 100%; height: 100%; }
  .qn-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .qn-title { font-size: 13px; font-weight: 700; color: #1c1c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qn-content { font-size: 11.5px; color: #8e8e93; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .qn-card.add { flex: 0 0 90px; align-items: center; justify-content: center; border: 1px dashed #d4d4d8; background: transparent; color: #c7c7cc; font-weight: 700; font-size: 22px; }
  .qn-card.add:hover { background: #f4f4f5; border-color: #c7c7cc; }

  .notes-divider { height: 1px; background: #e5e5ea; flex-shrink: 0; }

  .notes-grid-wrap { flex: 1; overflow-y: auto; min-height: 0; }
  .notes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .note-card { background: #f4f4f5; border: 1px solid #ececef; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
  .note-card:hover { background: #eeeeef; }
  .note-thumb { flex: 1; min-height: 140px; background: #eceded; display: flex; align-items: center; justify-content: center; color: #b0b0b5; font-size: 12.5px; font-weight: 600; }
  .note-card-title { padding: 9px 12px; font-size: 12.5px; font-weight: 600; color: #1c1c1e; border-top: 1px solid #e5e5ea; background: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-card.add { align-items: center; justify-content: center; border: 1px dashed #d4d4d8; background: transparent; min-height: 100%; }
  .note-card.add:hover { background: #f4f4f5; }
  .note-card.add .note-thumb { background: transparent; font-size: 30px; font-weight: 700; color: #c7c7cc; min-height: 0; }

  /* ================= placeholder view ================= */
  .placeholder-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #c7c7cc; }
  .placeholder-view svg { width: 32px; height: 32px; }
  .placeholder-view span { font-size: 13.5px; font-weight: 600; color: #a6a6ab; }
</style>
</head>
<body>
<div id="app">

  <!-- ================= sidebar ================= -->
  <div class="sidebar">

/* ============================================================
   NAVIGATION (sidebar -> view switching)
   ============================================================ */
function showView(id) {
  ["home", "calendar", "time", "notes"].forEach((k) => {
    const el = document.getElementById("view-" + k);
    if (el) el.style.display = k === id ? "flex" : "none";
  });
  document.getElementById("view-placeholder").style.display =
    ["home", "calendar", "time", "notes"].includes(id) ? "none" : "flex";
}
document.querySelectorAll(".nav-item").forEach((btn) => {
  btn.onclick = () => {
    document.querySelectorAll(".nav-item").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    showView(btn.getAttribute("data-id"));
  };
});

/* ============================================================
   SHARED HELPERS
   ============================================================ */
function pad(n) { return String(n).padStart(2, "0"); }

/* ============================================================
   HOME: clock / D-day / quick notes
   ============================================================ */
(function homeModule() {
  function updateClock() {
    const now = new Date();
    const weekdays = ["일","월","화","수","목","금","토"];
    document.getElementById("dateYear").textContent = `${now.getFullYear()}`;
    document.getElementById("dateFull").textContent =
      `${pad(now.getMonth()+1)}.${pad(now.getDate())} (${weekdays[now.getDay()]})`;
    document.getElementById("dateTime").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }
  updateClock();
  setInterval(updateClock, 1000 * 10);

  function updateDday() {
    const target = new Date("2026-08-15T00:00:00");
    target.setHours(0,0,0,0);
    const now = new Date(); now.setHours(0,0,0,0);
    const diffDays = Math.ceil((target - now) / 86400000);
    const label = diffDays === 0 ? "D-day" : diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)}`;
    document.getElementById("ddayValue").textContent = label;
  }
  updateDday();

  let quickNotes = [
    { id: "q1", text: "TRPG 세션 시나리오 다듬기" },
    { id: "q2", text: "캘린더 색상 최종 확정" },
  ];
  function renderQuickNotes() {
    const el = document.getElementById("quickNotesList");
    el.innerHTML = "";
    quickNotes.forEach((n) => {
      const row = document.createElement("div");
      row.className = "note-row";
      row.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19l1-4.2L15.8 4 20 8.2 8.2 19H4z"/></svg>
        <span class="note-text">${n.text}</span>`;
      el.appendChild(row);
    });
  }
  document.getElementById("quickAddBtn").onclick = () => {
    const text = prompt("메모 내용을 입력하세요");
    if (text && text.trim()) {
      quickNotes.push({ id: "q" + Date.now(), text: text.trim() });
      renderQuickNotes();
    }
  };
  renderQuickNotes();
})();

/* ============================================================
   CALENDAR module
   ============================================================ */
(function calendarModule() {
  const CALENDARS = [
    { id: "personal", name: "개인", color: "#FF3B30" },
    { id: "work", name: "업무", color: "#007AFF" },
    { id: "trpg", name: "TRPG", color: "#AF52DE" },
  ];
  const WEEKDAYS_KR = ["일","월","화","수","목","금","토"];
  const MONTHS_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function addMonths(d,n){ return new Date(d.getFullYear(), d.getMonth()+n, 1); }
  function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function startOfWeek(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }
  function buildMonthGrid(year,month){
    const gridStart = startOfWeek(new Date(year, month, 1));
    return Array.from({length:42}, (_,i)=> addDays(gridStart, i));
  }
  function timeToMinutes(t){ if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; }
  function calColor(id){ return CALENDARS.find(c=>c.id===id).color; }

  const CATEGORY_PALETTE = ["#FF9500","#34C759","#5AC8FA","#FF2D55","#AF52DE","#007AFF","#FF3B30","#00C7BE"];
  let paletteIdx = 0;

  const today = new Date();
  let viewDate = new Date();
  let selectedDate = new Date();
  let activeCalendars = new Set(CALENDARS.map(c=>c.id));
  let events = [
    { id:"e1", title:"TRPG 세션 - 겨울 시나리오", calendarId:"trpg", date: dateKey(today), start:"19:00", end:"23:00", allDay:false, location:"Discord", notes:"" },
    { id:"e2", title:"일정표 앱 배포", calendarId:"work", date: dateKey(addDays(today,2)), start:"10:00", end:"11:00", allDay:false, location:"", notes:"" },
    { id:"e3", title:"생일", calendarId:"personal", date: dateKey(addDays(today,5)), allDay:true, location:"", notes:"" },
  ];
  let editingId = null;

  function eventsByDate(){
    const map = {};
    events.filter(e=>activeCalendars.has(e.calendarId)).forEach(e=>{
      (map[e.date] = map[e.date] || []).push(e);
    });
    Object.values(map).forEach(list => list.sort((a,b)=> (a.allDay?-1:0) - (b.allDay?-1:0) || timeToMinutes(a.start)-timeToMinutes(b.start)));
    return map;
  }

  function renderCategoryList(){
    const el = document.getElementById("categoryList");
    el.innerHTML = "";
    CALENDARS.forEach(c=>{
      const active = activeCalendars.has(c.id);
      const count = events.filter(e=>e.calendarId===c.id).length;
      const row = document.createElement("label");
      row.className = "category-row";
      row.innerHTML = `
        <input type="checkbox" ${active?"checked":""} />
        <span class="cal-dot" style="background:${c.color}"></span>
        <span class="category-name ${active?"":"inactive"}">${c.name}</span>
        <span class="category-count ${active?"":"inactive"}">${count}</span>`;
      row.querySelector("input").onchange = () => {
        active ? activeCalendars.delete(c.id) : activeCalendars.add(c.id);
        renderAll();
      };
      el.appendChild(row);
    });
  }
  document.getElementById("categoryAddBtn").onclick = () => {
    const name = prompt("새 카테고리 이름을 입력하세요");
    if (!name || !name.trim()) return;
    const id = "cat" + Date.now();
    const color = CATEGORY_PALETTE[paletteIdx % CATEGORY_PALETTE.length];
    paletteIdx++;
    CALENDARS.push({ id, name: name.trim(), color });
    activeCalendars.add(id);
    refreshCalendarOptions();
    renderAll();
  };

  function renderMonth(){
    document.getElementById("monthLabel").textContent = `${viewDate.getFullYear()}년 ${MONTHS_KR[viewDate.getMonth()]}`;
    const grid = document.getElementById("dayGrid");
    grid.innerHTML = "";
    const byDate = eventsByDate();
    buildMonthGrid(viewDate.getFullYear(), viewDate.getMonth()).forEach(d=>{
      const inMonth = d.getMonth()===viewDate.getMonth();
      const isToday = isSameDay(d, today);
      const isSelected = isSameDay(d, selectedDate);
      const key = dateKey(d);
      const dayEvents = byDate[key] || [];
      const weekday = d.getDay();

      const cell = document.createElement("div");
      cell.className = "day-cell" + (isSelected ? " selected" : "");
      cell.onclick = () => { selectedDate = d; renderAll(); };
      cell.ondblclick = (e) => { e.stopPropagation(); openEditor(null, d); };

      const num = document.createElement("span");
      num.className = "day-num" + (isToday?" today":"") + (!inMonth?" outmonth":"") + (weekday===0&&!isToday?" sun":"") + (weekday===6&&!isToday?" sat":"");
      num.textContent = d.getDate();
      cell.appendChild(num);

      const evWrap = document.createElement("div");
      evWrap.className = "day-events";
      dayEvents.slice(0,2).forEach(ev=>{
        const pill = document.createElement("button");
        pill.className = "event-pill" + (ev.allDay ? " allday" : "");
        if (ev.allDay) pill.style.background = calColor(ev.calendarId);
        pill.innerHTML = (ev.allDay ? "" : `<span class="event-dot" style="background:${calColor(ev.calendarId)}"></span>`) +
          `<span class="event-title">${!ev.allDay && ev.start ? `<span class="event-time">${ev.start}</span>`:""}${ev.title}</span>`;
        pill.onclick = (e) => { e.stopPropagation(); openEditor(ev.id, null); };
        evWrap.appendChild(pill);
      });
      if (dayEvents.length > 2) {
        const more = document.createElement("span");
        more.className = "more-note";
        more.textContent = `+${dayEvents.length-2}`;
        evWrap.appendChild(more);
      }
      cell.appendChild(evWrap);
      grid.appendChild(cell);
    });
  }

  document.getElementById("todayBtn").onclick = () => { viewDate = new Date(); selectedDate = new Date(); renderAll(); };
  document.getElementById("prevBtn").onclick = () => { viewDate = addMonths(viewDate, -1); renderAll(); };
  document.getElementById("nextBtn").onclick = () => { viewDate = addMonths(viewDate, 1); renderAll(); };
  document.getElementById("addBtn").onclick = () => openEditor(null, selectedDate);

  const overlay = document.getElementById("modalOverlay");
  const fieldTitle = document.getElementById("fieldTitle");
  const fieldCalendar = document.getElementById("fieldCalendar");
  const fieldDate = document.getElementById("fieldDate");
  const fieldAllDay = document.getElementById("fieldAllDay");
  const fieldStart = document.getElementById("fieldStart");
  const fieldEnd = document.getElementById("fieldEnd");
  const fieldLocation = document.getElementById("fieldLocation");
  const fieldNotes = document.getElementById("fieldNotes");
  const timeFields = document.getElementById("timeFields");
  const modalSave = document.getElementById("modalSave");
  const modalTitle = document.getElementById("modalTitle");
  const deleteBtn = document.getElementById("deleteBtn");

  function refreshCalendarOptions(){
    fieldCalendar.innerHTML = CALENDARS.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
  }
  refreshCalendarOptions();

  function openEditor(id, defaultDate){
    editingId = id;
    refreshCalendarOptions();
    const ev = id ? events.find(e=>e.id===id) : null;
    modalTitle.textContent = ev ? "일정 편집" : "새 일정";
    fieldTitle.value = ev ? ev.title : "";
    fieldCalendar.value = ev ? ev.calendarId : CALENDARS[0].id;
    fieldDate.value = ev ? ev.date : dateKey(defaultDate || selectedDate);
    fieldAllDay.checked = ev ? !!ev.allDay : false;
    fieldStart.value = ev && ev.start ? ev.start : "09:00";
    fieldEnd.value = ev && ev.end ? ev.end : "10:00";
    fieldLocation.value = ev ? (ev.location||"") : "";
    fieldNotes.value = ev ? (ev.notes||"") : "";
    deleteBtn.style.display = ev ? "block" : "none";
    updateTimeFieldsVisibility();
    validateSave();
    overlay.classList.add("show");
    fieldTitle.focus();
  }
  function closeEditor(){ overlay.classList.remove("show"); }
  function updateTimeFieldsVisibility(){ timeFields.style.display = fieldAllDay.checked ? "none" : "block"; }
  function validateSave(){ modalSave.disabled = fieldTitle.value.trim().length === 0; }

  fieldTitle.oninput = validateSave;
  fieldAllDay.onchange = updateTimeFieldsVisibility;
  document.getElementById("modalCancel").onclick = closeEditor;
  overlay.onclick = (e) => { if (e.target === overlay) closeEditor(); };

  modalSave.onclick = () => {
    const title = fieldTitle.value.trim();
    if (!title) return;
    const data = {
      title, calendarId: fieldCalendar.value, date: fieldDate.value,
      allDay: fieldAllDay.checked,
      start: fieldAllDay.checked ? null : fieldStart.value,
      end: fieldAllDay.checked ? null : fieldEnd.value,
      location: fieldLocation.value, notes: fieldNotes.value,
    };
    if (editingId) {
      const idx = events.findIndex(e=>e.id===editingId);
      events[idx] = { ...events[idx], ...data };
    } else {
      events.push({ id: "e"+Date.now(), ...data });
    }
    closeEditor();
    renderAll();
  };
  deleteBtn.onclick = () => {
    events = events.filter(e=>e.id !== editingId);
    closeEditor();
    renderAll();
  };

  let todos = [
    { id:"t1", text:"TRPG 시나리오 정리", done:false },
    { id:"t2", text:"캘린더 앱 색상 다듬기", done:false },
    { id:"t3", text:"장보기", done:true },
  ];
  function renderTodos(){
    const el = document.getElementById("todoList");
    el.innerHTML = "";
    if (todos.length === 0) {
      el.innerHTML = `<div class="todo-empty">할 일이 없어요.</div>`;
      return;
    }
    todos.forEach(it=>{
      const row = document.createElement("div");
      row.className = "todo-row";
      row.innerHTML = `
        <button class="todo-check ${it.done?"done":""}"></button>
        <span class="todo-text ${it.done?"done":""}">${it.text}</span>
        <button class="todo-del">×</button>`;
      row.querySelector(".todo-check").onclick = () => { it.done = !it.done; renderTodos(); };
      row.querySelector(".todo-del").onclick = () => { todos = todos.filter(t=>t.id!==it.id); renderTodos(); };
      el.appendChild(row);
    });
  }
  document.getElementById("todoAddBtn").onclick = addTodo;
  document.getElementById("todoInput").addEventListener("keydown", (e)=>{ if(e.key==="Enter") addTodo(); });
  function addTodo(){
    const input = document.getElementById("todoInput");
    const text = input.value.trim();
    if (!text) return;
    todos.push({ id:"t"+Date.now(), text, done:false });
    input.value = "";
    renderTodos();
  }

  function renderAll(){
    renderCategoryList();
    renderMonth();
  }
  renderAll();
  renderTodos();
})();

/* ============================================================
   TIME module
   ============================================================ */
(function timeModule() {
  const SUBJECTS = [
    { id: "s1", name: "수학", color: "#FF3B30" },
    { id: "s2", name: "코딩", color: "#007AFF" },
    { id: "s3", name: "TRPG 준비", color: "#AF52DE" },
  ];
  let sessions = [
    { id: "log1", subjectId: "s1", seconds: 3600, endedAt: "오전 10:20" },
    { id: "log2", subjectId: "s2", seconds: 5400, endedAt: "오후 2:05" },
  ];
  let apps = [
    { id: "a1", name: "카카오톡", allowed: false },
    { id: "a2", name: "인스타그램", allowed: false },
    { id: "a3", name: "유튜브", allowed: false },
    { id: "a4", name: "메모", allowed: true },
    { id: "a5", name: "캘린더", allowed: true },
  ];

  let running = false;
  let elapsed = 0;
  let timerHandle = null;

  function formatHMS(total) {
    const h = Math.floor(total / 3600), m = Math.floor((total % 3600) / 60), s = total % 60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  function formatShort(total) {
    const h = Math.floor(total / 3600), m = Math.floor((total % 3600) / 60);
    return h > 0 ? `${h}시간 ${m}분` : `${m}분`;
  }
  function subjectById(id) { return SUBJECTS.find((s) => s.id === id); }

  const subjectSelect = document.getElementById("subjectSelect");
  subjectSelect.innerHTML = SUBJECTS.map((s) => `<option value="${s.id}">${s.name}</option>`).join("");
  subjectSelect.style.color = subjectById(subjectSelect.value).color;
  subjectSelect.onchange = () => { subjectSelect.style.color = subjectById(subjectSelect.value).color; };

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const clockDisplay = document.getElementById("clockDisplay");
  const focusNote = document.getElementById("focusNote");

  function tick() {
    elapsed += 1;
    clockDisplay.textContent = formatHMS(elapsed);
  }
  function startPause() {
    running = !running;
    if (running) {
      timerHandle = setInterval(tick, 1000);
      startBtn.textContent = "일시정지";
      startBtn.classList.add("running");
      stopBtn.disabled = false;
      subjectSelect.disabled = true;
      focusNote.classList.add("show");
    } else {
      clearInterval(timerHandle);
      startBtn.textContent = elapsed > 0 ? "계속" : "시작";
      startBtn.classList.remove("running");
      focusNote.classList.remove("show");
    }
  }
  function stopTimer() {
    if (elapsed > 0) {
      sessions.unshift({
        id: "log" + Date.now(),
        subjectId: subjectSelect.value,
        seconds: elapsed,
        endedAt: new Date().toLocaleTimeString("ko-KR", { hour: "numeric", minute: "2-digit" }),
      });
    }
    running = false;
    elapsed = 0;
    clearInterval(timerHandle);
    clockDisplay.textContent = "00:00:00";
    startBtn.textContent = "시작";
    startBtn.classList.remove("running");
    stopBtn.disabled = true;
    subjectSelect.disabled = false;
    focusNote.classList.remove("show");
    renderLog();
    renderStats();
  }
  startBtn.onclick = startPause;
  stopBtn.onclick = stopTimer;

  function renderLog() {
    const el = document.getElementById("logList");
    if (sessions.length === 0) {
      el.innerHTML = `<div class="empty-note">아직 기록이 없어요. 타이머를 시작해보세요.</div>`;
      return;
    }
    el.innerHTML = sessions.map((s) => {
      const subj = subjectById(s.subjectId);
      return `
        <div class="log-row">
          <span class="log-dot" style="background:${subj ? subj.color : "#c7c7cc"}"></span>
          <span class="log-name">${subj ? subj.name : "삭제된 과목"}</span>
          <span class="log-time">${formatShort(s.seconds)}</span>
          <span class="log-ended">${s.endedAt}</span>
        </div>`;
    }).join("");
  }

  function renderStats() {
    const totals = {};
    sessions.forEach((s) => { totals[s.subjectId] = (totals[s.subjectId] || 0) + s.seconds; });
    const totalToday = sessions.reduce((sum, s) => sum + s.seconds, 0);
    const maxVal = Math.max(1, ...SUBJECTS.map((s) => totals[s.id] || 0));

    document.getElementById("totalToday").textContent = formatShort(totalToday);

    const statsList = document.getElementById("statsList");
    statsList.innerHTML = SUBJECTS.map((s) => {
      const val = totals[s.id] || 0;
      const pct = Math.round((val / maxVal) * 100);
      return `
        <div class="stat-row">
          <div class="stat-labels">
            <span class="name">${s.name}</span>
            <span class="val">${val > 0 ? formatShort(val) : "-"}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${s.color}"></div>
          </div>
        </div>`;
    }).join("");
  }

  function renderApps() {
    const el = document.getElementById("appsList");
    el.innerHTML = apps.map((a) => `
      <div class="app-row">
        <span class="app-name">${a.name}</span>
        <span class="toggle ${a.allowed ? "on" : ""}" data-id="${a.id}"><span class="knob"></span></span>
      </div>`).join("");
    el.querySelectorAll(".toggle").forEach((t) => {
      t.onclick = () => {
        const id = t.getAttribute("data-id");
        const app = apps.find((a) => a.id === id);
        app.allowed = !app.allowed;
        t.classList.toggle("on", app.allowed);
      };
    });
  }

  renderLog();
  renderStats();
  renderApps();
})();

/* ============================================================
   NOTES module
   ============================================================ */
(function notesModule() {
  const pencilIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.5 4.5l5 5L8 21H3v-5z"/></svg>`;

  let quickNotes = [
    { id: "q1", title: "장보기 목록", content: "우유, 계란, 식빵, 바나나" },
    { id: "q2", title: "", content: "회의 전에 슬라이드 3장만 더 정리하기" },
    { id: "q3", title: "", content: "저녁 약속 7시 강남역" },
    { id: "q4", title: "아이디어", content: "주말 여행지 후보 조사" },
  ];
  let notes = [
    { id: "n1", title: "제주 여행" },
    { id: "n2", title: "카페 인테리어" },
    { id: "n3", title: "스터디 자료" },
    { id: "n4", title: "요리 레시피" },
    { id: "n5", title: "운동 루틴" },
    { id: "n6", title: "책 표지" },
  ];

  function renderQuickNotes() {
    const el = document.getElementById("qnScroll");
    el.innerHTML = "";
    quickNotes.forEach((n) => {
      const card = document.createElement("div");
      card.className = "qn-card";
      card.innerHTML = `
        <span class="qn-icon">${pencilIcon}</span>
        <span class="qn-body">
          ${n.title ? `<span class="qn-title">${n.title}</span>` : ""}
          <span class="qn-content">${n.content}</span>
        </span>`;
      el.appendChild(card);
    });
    const addCard = document.createElement("div");
    addCard.className = "qn-card add";
    addCard.textContent = "+";
    addCard.onclick = () => {
      const content = prompt("빠른 메모 내용을 입력하세요");
      if (!content || !content.trim()) return;
      const title = prompt("제목 (선택, 비워두면 제목 없이 저장돼요)") || "";
      quickNotes.push({ id: "q" + Date.now(), title: title.trim(), content: content.trim() });
      renderQuickNotes();
    };
    el.appendChild(addCard);
  }

  function renderNotesGrid() {
    const el = document.getElementById("notesGrid");
    el.innerHTML = "";
    notes.forEach((n) => {
      const card = document.createElement("div");
      card.className = "note-card";
      card.innerHTML = `
        <div class="note-thumb">이미지</div>
        <div class="note-card-title">${n.title}</div>`;
      el.appendChild(card);
    });
    const addCard = document.createElement("div");
    addCard.className = "note-card add";
    addCard.innerHTML = `<div class="note-thumb">+</div>`;
    addCard.onclick = () => {
      const title = prompt("새 노트 제목을 입력하세요");
      if (!title || !title.trim()) return;
      notes.push({ id: "n" + Date.now(), title: title.trim() });
      renderNotesGrid();
    };
    el.appendChild(addCard);
  }

  document.getElementById("qnPrev").onclick = () => {
    document.getElementById("qnScroll").scrollBy({ left: -240, behavior: "smooth" });
  };
  document.getElementById("qnNext").onclick = () => {
    document.getElementById("qnScroll").scrollBy({ left: 240, behavior: "smooth" });
  };

  renderQuickNotes();
  renderNotesGrid();
})();
</script>
